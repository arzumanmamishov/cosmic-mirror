services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cosmic:cosmic_secret@postgres:5432/cosmic_mirror?sslmode=disable
      REDIS_URL: redis://redis:6379
      EPHEMERIS_PATH: /app/ephemeris
      # Swiss Ephemeris C library reads SE_EPHE_PATH env var with highest priority
      SE_EPHE_PATH: /app/ephemeris
    volumes:
      - ./ephemeris:/app/ephemeris:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cosmic
      POSTGRES_PASSWORD: cosmic_secret
      POSTGRES_DB: cosmic_mirror
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmic -d cosmic_mirror"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
